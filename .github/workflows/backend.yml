name: Deploy Backend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate

      - name: Build TypeScript
        working-directory: backend
        run: npm run build

      - name: Create deployment package
        working-directory: backend
        run: |
          mkdir -p deploy
          cp -r dist/* deploy/
          cp package.json package-lock.json deploy/
          cp -r prisma deploy/
          mkdir -p deploy/node_modules/.prisma
          cp -r node_modules/.prisma/* deploy/node_modules/.prisma/ || true

      - name: Install production dependencies
        working-directory: backend/deploy
        run: |
          npm ci --omit=dev
          npx prisma generate

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B381DCEF5D9B45F89F4851A72E13056C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C03583C766A844EE86D16DE0805E433A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5294D2B98F3D4D33A6B2D678ADED4F73 }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: site-safety-login-linux
          slot-name: 'Production'
          package: backend/deploy
